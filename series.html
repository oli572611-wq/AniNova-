<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AniNova</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#070B14;--bg2:#0D1221;--bg3:#111827;--primary:#00BFFF;--secondary:#7A5CFF;--text:#fff;--muted:#8892A4;--border:#1A2035;--radius:8px;--hh:50px}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
    a{text-decoration:none;color:inherit}button{cursor:pointer;border:none;background:none;color:inherit;font-family:inherit}
    img{display:block;max-width:100%}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--primary);border-radius:2px}

    /* HEADER */
    header{position:sticky;top:0;z-index:100;height:var(--hh);background:rgba(7,11,20,.8);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between;padding:0 16px 0 10px;transition:background .3s}
    header.scrolled{background:rgba(7,11,20,.97)}
    .header-left{display:flex;align-items:center;gap:10px}
    .header-logo-img{height:38px;width:auto;display:block}
    .header-right{display:flex;align-items:center;gap:4px}
    .icon-btn{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:color .2s,background .2s}
    .icon-btn:hover{color:var(--primary);background:rgba(0,191,255,.1)}

    /* DRAWER */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s}
    .overlay.open{opacity:1;pointer-events:all}
    .drawer{position:fixed;top:0;left:-290px;width:280px;height:100dvh;background:var(--bg2);border-right:1px solid var(--border);z-index:201;transition:left .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow-y:auto}
    .drawer.open{left:0}
    .drawer-head{display:flex;align-items:center;justify-content:space-between;padding:18px 16px;border-bottom:1px solid var(--border)}
    .drawer-logo{font-family:'Oxanium',sans-serif;font-size:1.2rem;font-weight:800}
    .drawer-logo span{color:var(--primary)}
    .drawer-nav{padding:8px 0}
    .drawer-nav a{display:flex;align-items:center;gap:12px;padding:11px 16px;font-size:.9rem;font-weight:500;color:var(--muted);border-left:3px solid transparent;transition:color .2s,background .2s,border-color .2s}
    .drawer-nav a:hover{color:var(--primary);background:rgba(0,191,255,.07);border-left-color:var(--primary)}
    .nav-icon{font-size:1rem;width:20px;text-align:center}
    .drawer-div{height:1px;background:var(--border);margin:6px 16px}

    /* BANNER */
    .banner{position:relative;width:100%;height:65vw;max-height:480px;min-height:240px;overflow:hidden;background:var(--bg2)}
    .banner-img{width:100%;height:100%;object-fit:cover;object-position:center top}
    .banner-grad{position:absolute;inset:0;background:linear-gradient(90deg,rgba(7,11,20,.98) 0%,rgba(7,11,20,.5) 60%,rgba(7,11,20,.1) 100%),linear-gradient(0deg,rgba(7,11,20,1) 0%,rgba(7,11,20,0) 50%)}
    .banner-back{position:absolute;top:14px;left:14px;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;color:var(--muted);transition:color .2s}
    .banner-back:hover{color:var(--text)}

    /* INFO SECTION */
    .info-wrap{position:relative;margin-top:-60px;padding:0 16px 0;display:flex;gap:14px;align-items:flex-end}
    .cover-poster{width:90px;height:130px;border-radius:var(--radius);object-fit:cover;background:var(--bg3);border:2px solid var(--border);flex-shrink:0;box-shadow:0 8px 24px rgba(0,0,0,.5)}
    .info-right{flex:1;min-width:0;padding-bottom:4px}
    .info-title{font-family:'Oxanium',sans-serif;font-size:clamp(1rem,4.5vw,1.5rem);font-weight:800;line-height:1.2;margin-bottom:3px}
    .info-orig{font-size:.72rem;color:var(--muted);margin-bottom:6px}
    .badges{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
    .badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;letter-spacing:.3px}
    .badge-blue{background:rgba(0,191,255,.15);color:var(--primary)}
    .badge-purple{background:rgba(122,92,255,.15);color:var(--secondary)}
    .badge-green{background:rgba(16,185,129,.15);color:#10B981}
    .badge-yellow{background:rgba(245,158,11,.15);color:#F59E0B}
    .badge-gray{background:rgba(255,255,255,.08);color:var(--muted)}

    /* DETAIL BODY */
    .detail-body{padding:16px}

    /* ACTION BTNS */
    .action-row{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
    .btn-watch{display:inline-flex;align-items:center;gap:7px;background:var(--primary);color:#000;font-weight:700;font-size:.85rem;padding:10px 22px;border-radius:var(--radius);transition:opacity .2s,transform .2s}
    .btn-watch:hover{opacity:.88;transform:translateY(-1px)}
    .btn-trailer{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.08);color:var(--text);font-weight:600;font-size:.85rem;padding:10px 18px;border-radius:var(--radius);border:1px solid rgba(255,255,255,.12);transition:background .2s}
    .btn-trailer:hover{background:rgba(255,255,255,.14)}

    /* OVERVIEW */
    .section-label{font-family:'Oxanium',sans-serif;font-size:.82rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
    .overview-text{font-size:.85rem;line-height:1.65;color:rgba(255,255,255,.75);margin-bottom:18px}
    .overview-text.clamped{display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
    .read-more{font-size:.78rem;color:var(--primary);cursor:pointer;margin-top:-12px;margin-bottom:18px;display:none}

    /* GENRES */
    .genres-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:20px}
    .genre-tag{font-size:.75rem;font-weight:600;padding:4px 12px;border-radius:20px;background:var(--bg2);border:1px solid var(--border);color:var(--muted);transition:color .2s,border-color .2s,background .2s;cursor:pointer}
    .genre-tag:hover{color:var(--primary);border-color:var(--primary);background:rgba(0,191,255,.07)}

    /* DIVIDER */
    .divider{height:1px;background:var(--border);margin:18px 0}

    /* SEASONS TABS */
    .season-tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;margin-bottom:14px;padding-bottom:2px}
    .season-tabs::-webkit-scrollbar{display:none}
    .season-tab{flex-shrink:0;padding:7px 16px;border-radius:20px;font-size:.8rem;font-weight:700;background:var(--bg2);border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .2s}
    .season-tab.active{background:var(--primary);color:#000;border-color:var(--primary)}

    /* EPISODE BOXES */
    .ep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(52px,1fr));gap:7px}
    .ep-box{aspect-ratio:1;border-radius:var(--radius);background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:700;cursor:pointer;transition:all .2s;text-decoration:none;color:var(--text)}
    .ep-box:hover{border-color:var(--primary);color:var(--primary);background:rgba(0,191,255,.07)}
    .ep-box.active{background:var(--primary);color:#000;border-color:var(--primary)}

    /* RECOMMENDED */
    .rec-row{display:flex;gap:9px;overflow-x:auto;scroll-snap-type:x mandatory;scrollbar-width:none;padding-bottom:4px}
    .rec-row::-webkit-scrollbar{display:none}
    .rec-card{flex:0 0 calc(33.33% - 6px);scroll-snap-align:start;cursor:pointer;text-decoration:none}
    .rec-img{width:100%;aspect-ratio:2/3;object-fit:cover;border-radius:var(--radius);background:var(--bg3);transition:transform .28s,box-shadow .28s}
    .rec-card:hover .rec-img{transform:scale(1.04);box-shadow:0 6px 20px rgba(0,191,255,.2)}
    .rec-name{font-size:.72rem;font-weight:600;color:var(--muted);margin-top:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

    /* SKELETON */
    .skel{background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3) 50%,var(--bg2) 75%);background-size:300% 100%;animation:shimmer 1.6s infinite linear;border-radius:var(--radius)}
    @keyframes shimmer{0%{background-position:300% 0}100%{background-position:-300% 0}}

    /* FOOTER */
    footer{margin-top:36px;padding:20px 16px 32px;border-top:1px solid var(--border)}
    .footer-links{display:flex;flex-wrap:wrap;justify-content:center;gap:8px 20px;margin-bottom:14px}
    .footer-links a{font-size:.78rem;color:var(--muted);transition:color .2s}
    .footer-links a:hover{color:var(--primary)}
    .footer-copy{text-align:center;font-size:.72rem;color:var(--muted);opacity:.5}
    .footer-copy strong{font-family:'Oxanium',sans-serif;font-weight:800;color:var(--primary);opacity:1}

    @media(min-width:640px){
      .banner{height:50vw}
      .info-wrap{padding:0 24px}
      .cover-poster{width:110px;height:160px}
      .detail-body{padding:20px 24px}
    }
    @media(min-width:1024px){
      header{padding:0 48px}
      .banner{height:42vw;max-height:520px}
      .info-wrap{padding:0 48px;max-width:1100px;margin:0 auto;margin-top:-80px}
      .cover-poster{width:130px;height:190px}
      .detail-body{padding:24px 48px;max-width:1100px;margin:0 auto}
      .ep-grid{grid-template-columns:repeat(auto-fill,minmax(56px,1fr))}
      .rec-card{flex:0 0 calc(16.66% - 8px)}
      footer{max-width:1100px;margin:0 auto;padding:24px 48px 48px}
    }
  </style>
</head>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, collection, doc, getDoc, getDocs, query, where, limit, orderBy }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey:"AIzaSyDmg1xw9VXhszxm1IKmBKh24yQDDtSKoQ8",
    authDomain:"aninova-c1d69.firebaseapp.com",
    projectId:"aninova-c1d69",
    storageBucket:"aninova-c1d69.firebasestorage.app",
    messagingSenderId:"1089254256286",
    appId:"1:1089254256286:web:7755ed1f346e0a0921958f"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  /* ── URL PARAMS ── */
  const params  = new URLSearchParams(location.search);
  const animeId = params.get('id');
  const slug    = params.get('slug') || '';

  if (!animeId) { window.location.href = 'index.html'; }

  function toSlug(str){ return str.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); }

  /* ── LOAD ANIME ── */
  async function loadAnime() {
    try {
      const snap = await getDoc(doc(db,'anime',animeId));
      if (!snap.exists()) { window.location.href='index.html'; return; }
      const anime = { id: snap.id, ...snap.data() };

      document.title = `${anime.title} — AniNova`;

      // Banner
      const bImg = document.getElementById('bannerImg');
      bImg.src = anime.banner_url || anime.cover_url || '';
      bImg.alt = anime.title;

      // Cover
      const cImg = document.getElementById('coverImg');
      cImg.src = anime.cover_url || '';
      cImg.alt = anime.title;
      cImg.onerror = () => cImg.style.display = 'none';

      // Title
      document.getElementById('infoTitle').textContent = anime.title || '';
      if (anime.original_title) {
        document.getElementById('infoOrig').textContent = anime.original_title;
      }

      // Badges
      const badges = [
        anime.type === 'series' ? ['Series','badge-blue'] : null,
        anime.rating   ? [`⭐ ${anime.rating}`, 'badge-yellow'] : null,
        anime.quality  ? [anime.quality, 'badge-gray'] : null,
        anime.audio_lang ? [anime.audio_lang, 'badge-purple'] : null,
        anime.status   ? [anime.status, anime.status==='Ongoing'?'badge-green':'badge-gray'] : null,
        anime.aired_from ? [anime.aired_from.split('-')[0], 'badge-gray'] : null,
      ].filter(Boolean);
      document.getElementById('infoBadges').innerHTML = badges.map(([t,c]) =>
        `<span class="badge ${c}">${t}</span>`).join('');

      // Watch button
      document.getElementById('watchBtn').href = `watch.html?id=${anime.id}&slug=${slug}&s=1&ep=1`;

      // Trailer
      if (anime.trailer_link) {
        const tb = document.getElementById('trailerBtn');
        tb.href = anime.trailer_link;
        tb.style.display = 'inline-flex';
      }

      // Overview
      const ov = document.getElementById('overviewText');
      ov.textContent = anime.overview || 'No description available.';
      if ((anime.overview||'').length > 200) {
        const rm = document.getElementById('readMore');
        rm.style.display = 'block';
        rm.addEventListener('click', () => {
          ov.classList.toggle('clamped');
          rm.textContent = ov.classList.contains('clamped') ? 'Read more ▾' : 'Show less ▴';
        });
      }

      // Genres
      const genres = Array.isArray(anime.genres) ? anime.genres : (anime.genres||'').split(',').map(g=>g.trim()).filter(Boolean);
      document.getElementById('genresRow').innerHTML = genres.map(g =>
        `<a href="genre.html?g=${encodeURIComponent(g)}" class="genre-tag">${g}</a>`).join('');

      // Load episodes
      await loadEpisodes(anime.id, anime);

      // Recommended
      await loadRecommended(anime);

    } catch(e) {
      console.error(e);
    }
  }

  /* ── EPISODES ── */
  let allEpisodes = [];
  let currentSeason = 1;
  let animeData = null;

  async function loadEpisodes(fbId, anime) {
    animeData = anime;
    const q    = query(collection(db,'episodes'), where('anime_fb_id','==',fbId));
    const snap = await getDocs(q);
    allEpisodes = snap.docs.map(d => ({id:d.id,...d.data()})).sort((a,b) => {
      if (a.season_num !== b.season_num) return a.season_num - b.season_num;
      return a.episode_num - b.episode_num;
    });

    // Get unique seasons
    const seasons = [...new Set(allEpisodes.map(e => e.season_num))].sort((a,b)=>a-b);
    if (!seasons.length) {
      document.getElementById('epGrid').innerHTML = '<p style="color:var(--muted);font-size:.82rem">No episodes yet.</p>';
      return;
    }

    // Season tabs
    document.getElementById('seasonTabs').innerHTML = seasons.map(s =>
      `<button class="season-tab${s===seasons[0]?' active':''}" data-s="${s}">Season ${s}</button>`
    ).join('');

    document.querySelectorAll('.season-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.season-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        renderEpisodes(Number(tab.dataset.s));
      });
    });

    renderEpisodes(seasons[0]);
  }

  function renderEpisodes(season) {
    currentSeason = season;
    const eps = allEpisodes.filter(e => e.season_num === season);
    const slug2 = toSlug(animeData?.title||'');
    document.getElementById('epGrid').innerHTML = eps.map(e =>
      `<a class="ep-box" href="watch.html?id=${animeData.id}&slug=${slug2}&s=${season}&ep=${e.episode_num}"
          title="Episode ${e.episode_num}${e.episode_title?' — '+e.episode_title:''}">
        ${e.episode_num}
      </a>`
    ).join('');
  }

  /* ── RECOMMENDED ── */
  async function loadRecommended(anime) {
    try {
      const q    = query(collection(db,'anime'), where('type','==','series'), limit(10));
      const snap = await getDocs(q);
      const items = snap.docs.map(d => ({id:d.id,...d.data()}))
        .filter(a => a.id !== anime.id).slice(0,8);
      document.getElementById('recRow').innerHTML = items.map(a => {
        const s = toSlug(a.title||'');
        return `<a class="rec-card" href="series.html?id=${a.id}&slug=${s}">
          <img class="rec-img" src="${a.cover_url||''}" alt="${a.title}" loading="lazy" onerror="this.src='https://placehold.co/140x210/0D1221/8892A4?text=?'">
          <p class="rec-name">${a.title||''}</p>
        </a>`;
      }).join('');
    } catch(e){ console.error(e); }
  }

  /* ── DRAWER ── */
  const drawer  = document.getElementById('drawer');
  const overlay = document.getElementById('overlay');
  document.getElementById('menuBtn').addEventListener('click', () => { drawer.classList.add('open'); overlay.classList.add('open'); document.body.style.overflow='hidden'; });
  document.getElementById('closeBtn').addEventListener('click', () => { drawer.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow=''; });
  overlay.addEventListener('click', () => { drawer.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow=''; });

  loadAnime();
</script>
<script>const _h=document.getElementById('header');window.addEventListener('scroll',()=>{_h.classList.toggle('scrolled',window.scrollY>10);},{passive:true});</script>
</body>
